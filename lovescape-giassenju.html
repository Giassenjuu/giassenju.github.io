<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dari Giassenju ❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000010;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  #main-text {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: clamp(2rem, 8vw, 4.5rem);
    color: #fff;
    letter-spacing: 0.08em;
    text-shadow:
      0 0 20px rgba(255,80,80,0.9),
      0 0 60px rgba(255,40,40,0.5),
      0 0 100px rgba(200,0,0,0.3);
    animation: fadeInDown 2s ease forwards, glow 3s ease-in-out infinite;
    opacity: 0;
    text-align: center;
    padding: 0 20px;
  }

  #sub-text {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: clamp(1rem, 4vw, 1.6rem);
    color: rgba(255, 180, 180, 0.9);
    letter-spacing: 0.25em;
    text-transform: lowercase;
    margin-top: 14px;
    text-shadow: 0 0 30px rgba(255,100,100,0.7);
    animation: fadeInUp 2.5s ease forwards, glow2 3s ease-in-out infinite;
    opacity: 0;
    text-align: center;
  }

  #heart-emoji {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    margin-top: 10px;
    animation: fadeIn 3s ease forwards, beatHeart 1.5s ease-in-out infinite;
    opacity: 0;
  }

  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.2);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    font-family: Georgia, serif;
    pointer-events: none;
  }

  @keyframes fadeInDown {
    0% { opacity: 0; transform: translateY(-30px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(30px); }
    30% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    0%, 40% { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(255,80,80,0.9), 0 0 60px rgba(255,40,40,0.5); }
    50% { text-shadow: 0 0 40px rgba(255,100,100,1), 0 0 100px rgba(255,60,60,0.8), 0 0 160px rgba(200,0,0,0.4); }
  }
  @keyframes glow2 {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
  }
  @keyframes beatHeart {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.25); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <div id="main-text">kamu lucuu</div>
  <div id="sub-text">— dari Giassenju</div>
  <div id="heart-emoji">🩷</div>
</div>

<div id="hint">drag to rotate &nbsp;·&nbsp; scroll to zoom</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

const particles = [];

for (let i = 0; i < 3000; i++) {
  const t = Math.random() * Math.PI * 2;
  const p = heartPoint(t);
  particles.push({
    ox: p.x * 18,
    oy: p.y * 18,
    oz: (Math.random() - 0.5) * 10,
    type: 'surface',
    size: Math.random() * 2.2 + 0.8,
    brightness: Math.random() * 0.5 + 0.7,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.02 + 0.01
  });
}

for (let i = 0; i < 1800; i++) {
  let px, py, inside;
  do {
    px = (Math.random() - 0.5) * 32;
    py = (Math.random() - 0.5) * 28;
    const nx = px / 16, ny = py / 13;
    inside = Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * ny*ny*ny < 0.15;
  } while (!inside);
  particles.push({
    ox: px * 18,
    oy: py * 18,
    oz: (Math.random() - 0.5) * 30,
    type: 'fill',
    size: Math.random() * 1.4 + 0.3,
    brightness: Math.random() * 0.4 + 0.2,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.015 + 0.005
  });
}

for (let i = 0; i < 350; i++) {
  particles.push({
    ox: (Math.random() - 0.5) * 900,
    oy: (Math.random() - 0.5) * 700,
    oz: (Math.random() - 0.5) * 400,
    type: 'star',
    size: Math.random() * 1.5 + 0.3,
    brightness: Math.random() * 0.5 + 0.1,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.01 + 0.003
  });
}

let rotX = 0.25, rotY = 0;
let targetRotX = 0.25, targetRotY = 0;
let isDragging = false, lastMX = 0, lastMY = 0;
let autoRotate = true;
let zoom = 1, targetZoom = 1;

canvas.addEventListener('mousedown', e => { isDragging = true; autoRotate = false; lastMX = e.clientX; lastMY = e.clientY; });
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetRotY += (e.clientX - lastMX) * 0.008;
  targetRotX += (e.clientY - lastMY) * 0.008;
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('wheel', e => {
  targetZoom *= e.deltaY > 0 ? 0.93 : 1.07;
  targetZoom = Math.max(0.4, Math.min(2.5, targetZoom));
});
canvas.addEventListener('touchstart', e => { isDragging = true; autoRotate = false; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; });
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  targetRotY += (e.touches[0].clientX - lastMX) * 0.01;
  targetRotX += (e.touches[0].clientY - lastMY) * 0.01;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => isDragging = false);

function project(x, y, z) {
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let x1 = x * cosY - z * sinY;
  let z1 = x * sinY + z * cosY;
  let y1 = y * cosX - z1 * sinX;
  let z2 = y * sinX + z1 * cosX;
  const fov = 600;
  const scale = fov / (fov + z2);
  return { sx: x1 * scale, sy: y1 * scale, z: z2, scale };
}

let time = 0;
function draw() {
  time += 0.016;
  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;
  zoom += (targetZoom - zoom) * 0.08;
  if (autoRotate) targetRotY += 0.006;

  const beat = 1 + 0.04 * Math.sin(time * 1.8) + 0.02 * Math.sin(time * 3.6);

  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  bg.addColorStop(0, 'rgba(25,0,18,1)');
  bg.addColorStop(1, 'rgba(0,0,8,1)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const projected = particles.map(p => {
    const proj = project(p.ox * beat, p.oy * beat, p.oz);
    p.twinkle += p.twinkleSpeed;
    const tw = 0.6 + 0.4 * Math.sin(p.twinkle);
    return { ...proj, p, tw };
  });
  projected.sort((a, b) => b.z - a.z);

  const cx = W / 2, cy = H / 2;

  for (const { sx, sy, scale, p, tw } of projected) {
    const x = cx + sx * zoom;
    const y = cy + sy * zoom;
    const r = p.size * scale * zoom;

    if (p.type === 'star') {
      ctx.beginPath();
      ctx.arc(x, y, Math.max(r, 0.5), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,220,220,${p.brightness * tw * 0.7})`;
      ctx.fill();
    } else if (p.type === 'surface') {
      const alpha = p.brightness * tw;
      const depth = (p.oz + 50) / 100;
      const red = Math.floor(200 + 55 * depth);
      const green = Math.floor(20 * depth);
      const blue = Math.floor(20 * depth);
      ctx.beginPath();
      ctx.arc(x, y, Math.max(r, 0.4), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${red},${green},${blue},${alpha})`;
      ctx.fill();
      if (tw > 0.85 && r > 1) {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
        grd.addColorStop(0, `rgba(255,80,60,${alpha * 0.4})`);
        grd.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.beginPath();
        ctx.arc(x, y, r * 3, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      }
    } else {
      ctx.beginPath();
      ctx.arc(x, y, Math.max(r, 0.3), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,50,50,${p.brightness * tw * 0.6})`;
      ctx.fill();
    }
  }

  // Center glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 260 * zoom);
  glow.addColorStop(0, `rgba(180,20,20,${0.07 + 0.04 * Math.sin(time * 1.8)})`);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 260 * zoom, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
